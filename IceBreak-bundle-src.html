function textColor(hex) {
  const r = parseInt(hex.slice(1, 3), 16),g = parseInt(hex.slice(3, 5), 16),b = parseInt(hex.slice(5, 7), 16);

// ─── QR Code generator (pure SVG) ─────────────────────────────────────────
function generateQRMatrix(text) {
  // Simple visual QR placeholder — a real QR grid for the URL
  // We'll use a deterministic pattern based on the URL
  const size = 21;
  const matrix = Array.from({ length: size }, () => Array(size).fill(0));
  // Finder patterns
  const finder = (r, c) => {
    for (let i = 0; i < 7; i++) for (let j = 0; j < 7; j++) {
      if (i === 0 || i === 6 || j === 0 || j === 6 || i >= 2 && i <= 4 && j >= 2 && j <= 4) matrix[r + i][c + j] = 1;
    }
  };
  finder(0, 0);finder(0, 14);finder(14, 0);
  // Timing patterns
  for (let i = 8; i < 13; i++) {matrix[6][i] = i % 2 === 0 ? 1 : 0;matrix[i][6] = i % 2 === 0 ? 1 : 0;}
  // Data fill with hash of text
  let hash = 0;for (let i = 0; i < text.length; i++) hash = hash * 31 + text.charCodeAt(i) >>> 0;
  for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) {
    if (!matrix[r][c] && !(r < 8 && c < 8) && !(r < 8 && c > 12) && !(r > 12 && c < 8))
    matrix[r][c] = (hash ^ r * 17 + c * 13 ^ (r ^ c)) & 1;
  }
  return matrix;
}

function QRCodeSVG({ url, size = 160 }) {
  const matrix = generateQRMatrix(url);
  const n = matrix.length;
  const cell = size / n;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <rect width={size} height={size} fill="white" rx="8" />
      {matrix.map((row, r) => row.map((v, c) => v ?
      <rect key={`${r}-${c}`} x={c * cell} y={r * cell} width={cell} height={cell} fill="#0A0A0A" /> :
      null))}
    </svg>);

}

// ─── Card Component ────────────────────────────────────────────────────────
function Card({ question, cardColor, index, total, isFaved, onFave, onNext, onDefer, isTop, showTooltip }) {
  const tc = textColor(cardColor);
  const cardRef = useRef(null);
  const startXRef = useRef(null);
  const startYRef = useRef(null);
  const currDxRef = useRef(0);
  const animatingRef = useRef(false);
  const [tooltipVisible, setTooltipVisible] = useState(showTooltip);

  useEffect(() => {setTooltipVisible(showTooltip);}, [showTooltip]);

  const ql = question.length;
  const qFontSize = ql < 50 ? 30 : ql < 70 ? 25 : 21;

  const resetCard = () => {
    if (!cardRef.current) return;
    cardRef.current.style.transition = 'transform 0.5s cubic-bezier(.34,1.56,.64,1), opacity 0.5s ease';
    cardRef.current.style.transform = 'translateX(0) rotate(0deg)';
    cardRef.current.style.opacity = '1';
    currDxRef.current = 0;
  };

  const animateOut = (dir, cb) => {
    if (!cardRef.current || animatingRef.current) return;
    animatingRef.current = true;
    const tx = dir > 0 ? '140vw' : '-140vw';
    const rot = dir > 0 ? '22deg' : '-22deg';
    cardRef.current.style.transition = 'transform 0.4s cubic-bezier(.25,.46,.45,.94), opacity 0.3s ease';
    cardRef.current.style.transform = `translateX(${tx}) rotate(${rot})`;
    cardRef.current.style.opacity = '0';
    setTimeout(() => {animatingRef.current = false;cb();}, 380);
  };

  const onPointerDown = (e) => {
    if (!isTop) return;
    startXRef.current = e.clientX;
    startYRef.current = e.clientY;
    currDxRef.current = 0;
    if (cardRef.current) cardRef.current.style.transition = 'none';
  };

  const onPointerMove = (e) => {
    if (startXRef.current === null) return;
    const dx = e.clientX - startXRef.current;
    const dy = e.clientY - startYRef.current;
    if (Math.abs(dy) > Math.abs(dx) + 10) return; // vertical scroll
    currDxRef.current = dx;
    const rot = dx * 0.07;
    const opacity = Math.max(0.4, 1 - Math.abs(dx) / 300);
    if (cardRef.current) {
      cardRef.current.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
      cardRef.current.style.opacity = opacity;
    }
  };

  const onPointerUp = (e) => {
    if (startXRef.current === null) return;
    const dx = currDxRef.current;
    startXRef.current = null;
    if (Math.abs(dx) > 75) {
      if (dx > 0) animateOut(1, onNext);else
      animateOut(-1, onDefer);
    } else {
      resetCard();
    }
  };

  const onClick = (e) => {
    if (Math.abs(currDxRef.current) < 8 && isTop) {
      animateOut(1, onNext);
    }
  };

  return (
    <div
      ref={cardRef}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerLeave={onPointerUp}
      onClick={onClick}
      style={{
        position: 'absolute',
        width: '92vw',
        maxWidth: 400,
        minHeight: 510,
        borderRadius: 'var(--card-radius, 28px)',
        background: cardColor,
        padding: '28px 26px 26px',
        boxShadow: '0 28px 70px rgba(0,0,0,0.45)',
        display: 'flex',
        flexDirection: 'column',
        justifyContent: 'space-between',
        cursor: isTop ? 'grab' : 'default',
        userSelect: 'none',
        touchAction: 'none',
        zIndex: isTop ? 10 : 5 - index,
        transform: !isTop ?
        index === 1 ? 'translateY(10px) rotate(1.8deg) scale(0.965)' :
        'translateY(20px) rotate(3.6deg) scale(0.93)' :
        'translateX(0) rotate(0deg)',
        transition: !isTop ? 'transform 0.3s ease' : undefined
      }}>
      
      {/* Top row */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <ProgressDots total={total} current={index} tc={tc} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 12, fontFamily: 'DM Sans', fontWeight: 500, color: tc, opacity: 0.6 }}>{index + 1} of {total}</span>
          <button
            onClick={(e) => {e.stopPropagation();onFave();}}
            style={{
              display: 'flex', alignItems: 'center', gap: 5,
              padding: '5px 10px',
              borderRadius: 20,
              border: `1.5px solid ${isFaved ? tc : tc + '55'}`,
              background: isFaved ? tc + '33' : tc + '18',
              cursor: 'pointer',
              fontSize: 13,
              fontFamily: 'DM Sans',
              fontWeight: 600,
              color: tc,
              transition: 'all 0.2s ease',
              whiteSpace: 'nowrap'
            }}>
            
            <StarIcon filled={isFaved} color={tc} />
            {isFaved ? 'Saved' : 'Save'}
          </button>
        </div>
      </div>

      {/* Question */}
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', padding: '24px 0', fontFamily: "\"DM Sans\"" }}>
        <p style={{
          fontFamily: 'DM Serif Display',
          fontSize: qFontSize,
          lineHeight: 1.38,
          color: tc,
          textWrap: 'pretty'
        }}>{question}</p>
      </div>

      {/* Bottom row */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'relative' }}>
        {tooltipVisible && isTop ?
        <span style={{
          fontSize: 12, fontFamily: 'DM Sans', color: tc, opacity: 0.7,
          animation: 'fadeOut 0.5s ease 3.5s forwards'
        }}>← come back &nbsp;·&nbsp; next →</span> :

        <span style={{ fontSize: 12, fontFamily: 'DM Sans', color: tc, opacity: 0.28 }}>swipe or tap</span>
        }
        <button
          onClick={(e) => {e.stopPropagation();if (isTop) animateOut(1, onNext);}}
          style={{
            background: 'transparent', border: 'none', cursor: 'pointer',
            padding: 4, lineHeight: 0, color: tc
          }}>
          
          <ArrowRight size={36} color={tc} />
        </button>
      </div>
    </div>);

}

    setStep(2);
    setError('');
    try {
      const text = await window.claude.complete({
        messages: [{
          role: 'user',
          content: `Generate exactly 10 icebreaker questions for a meetup or social gathering with the topic: "${trimmed}".

Rules:
- Each question should be specific to the topic, not generic
- Questions should spark real conversation, not have obvious answers
- Keep each question under 15 words
- No numbering, no bullet points
- Return ONLY a JSON array of 10 strings, nothing else
- Example format: ["Question 1?","Question 2?",...]`
        }]
      });
      const clean = text.replace(/```json|```/g, '').trim();
      const qs = JSON.parse(clean);
      setQuestions(qs);
      setCatName(trimmed.charAt(0).toUpperCase() + trimmed.slice(1));
      setStep(3);

        {step === 1 &&

            <div style={{ display: 'flex', gap: 10, marginBottom: 20 }}>
              <input

              value={topic}
              onChange={(e) => setTopic(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && generate()}

              style={{

// ─── Card Stack View ───────────────────────────────────────────────────────
function CardStack({ category, favs, onFaveToggle, onEnd }) {
  const [deck, setDeck] = useState(() => [...category.questions]);
  const [seen, setSeen] = useState(0);
  const [showTooltip, setShowTooltip] = useState(true);
  const total = category.questions.length;

  // Re-init when category changes
  const prevCatId = useRef(category.id);
  useEffect(() => {
    if (prevCatId.current !== category.id) {
      prevCatId.current = category.id;
      setDeck([...category.questions]);
      setSeen(0);
      setShowTooltip(true);
    }
  }, [category]);

  const handleNext = () => {
    setShowTooltip(false);
    setDeck((d) => {
      const nd = d.slice(1);
      const ns = seen + 1;
      setSeen(ns);
      if (ns >= total) {setTimeout(onEnd, 100);}
      return nd;
    });
  };

  const handleDefer = () => {
    setShowTooltip(false);
    setDeck((d) => {
      if (d.length <= 1) return d;
      const [first, ...rest] = d;
      return [...rest, first];
    });
  };

  if (deck.length === 0) return null;

  // Favs empty state
  if (category.isFavs && category.questions.length === 0) {
    return (
      <div style={{
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        justifyContent: 'center', gap: 12,
        width: '92vw', maxWidth: 400,
        minHeight: 510,
        borderRadius: 28,
        border: '1px dashed #CCC8C0',
        textAlign: 'center', padding: 32
      }}>
        <span style={{ fontSize: 32 }}>⭐</span>
        <p style={{ fontFamily: 'DM Serif Display', fontSize: 22, color: '#1A1A1A', lineHeight: 1.4 }}>
          No favorites yet.
        </p>
        <p style={{ fontFamily: 'DM Sans', fontSize: 14, color: '#555' }}>
          Save cards as you go ★
        </p>
      </div>);

  }

  const visibleCards = deck.slice(0, 3);

  return (
    <div style={{
      position: 'relative',
      width: '92vw', maxWidth: 400,
      height: 530,
      display: 'flex', alignItems: 'center', justifyContent: 'center'
    }}>
      {[...visibleCards].reverse().map((q, ri) => {
        const i = visibleCards.length - 1 - ri;
        const isTop = i === 0;
        const cardIndex = category.questions.indexOf(q);
        const absoluteIndex = seen + i;
        return (
          <Card
            key={q}
            question={q}
            cardColor={category.color}
            index={absoluteIndex < total ? absoluteIndex : total - 1}
            total={total}
            isFaved={favs.includes(q)}
            onFave={() => onFaveToggle(q)}
            onNext={handleNext}
            onDefer={handleDefer}
            isTop={isTop}
            showTooltip={showTooltip && isTop && seen === 0} />);


      })}
    </div>);

}

              </button>
            </div>

            {/* Bottom divider */}
            <div style={{ height: 1, background: '#D8D2C8', margin: '20px 0 0' }} />

            {/* Footer */}
            <div style={{
              display: 'flex', alignItems: 'center',
              padding: '20px 0 24px', gap: 16,
            }}>
              <div style={{ flexShrink: 0, opacity: 0.8 }}>
                <LandingPeep size={90} opacity={tweaks.doodleOpacity} />
              </div>
              <div style={{ flex: 1 }}>
                <p style={{ fontFamily: 'DM Serif Display', fontSize: 15, color: '#1A1A1A', marginBottom: 4, lineHeight: 1.4 }}>
                  Real conversations,<br />zero awkwardness.
                </p>
                <p style={{ fontFamily: 'DM Sans', fontSize: 12, color: '#999', marginTop: 8 }}>
                  Made with ♥ by <span style={{ color: '#1A1A1A', fontWeight: 600 }}>Shacyz</span>
                </p>
              </div>
            </div>
          </div>
        )}

        {activeCat && !isEnded &&
        <CardStack
          key={activeCatId}
          category={activeCat.isFavs ? { ...activeCat, questions: favs } : activeCat}
          favs={favs}
          onFaveToggle={handleFaveToggle}
          onEnd={() => setIsEnded(true)} />

        }

        {activeCat && isEnded &&
        <EndState
          category={activeCat}
          onShuffle={handleShuffle} />

        }
      </div>

      {/* Bottom bar */}
      <BottomBar onWA={() => setShowToast('wa')} onQRBar={() => setShowToast('qr')} pageUrl={pageUrl} />
      <div style={{ height: 'env(safe-area-inset-bottom,12px)', minHeight: 12 }} />

      {/* Modals */}
      {showCreate && <CreateModal onClose={() => setShowCreate(false)} onCreate={handleCreate} />}
      {showQR && <QRModal onClose={() => setShowQR(false)} />}
      {showToast === 'wa' && (
        <ComingSoonToast
          message="WhatsApp sharing is coming soon. We're working on it!"
          url={pageUrl}
          onClose={() => setShowToast(null)}
        />
      )}
      {showToast === 'qr' && (
        <ComingSoonToast
          message="QR code sharing is coming soon. For now, copy the link below!"
          url={pageUrl}
          onClose={() => setShowToast(null)}
        />
      )}

      {/* Tweaks Panel */}
      <TweaksPanel>
        <TweakSection label="Branding">
          <TweakText label="App name" value={tweaks.appName} onChange={(v) => setTweak('appName', v)} />
          <TweakText label="Tagline line 1" value={tweaks.tagline1} onChange={(v) => setTweak('tagline1', v)} />
          <TweakText label="Tagline line 2" value={tweaks.tagline2} onChange={(v) => setTweak('tagline2', v)} />
        </TweakSection>
        <TweakSection label="Doodle">
          <TweakSlider label="Size" value={tweaks.doodleSize} min={100} max={340} step={10} onChange={(v) => setTweak('doodleSize', v)} />
          <TweakSlider label="Opacity" value={tweaks.doodleOpacity} min={10} max={100} step={5} onChange={(v) => setTweak('doodleOpacity', v)} />
        </TweakSection>
        <TweakSection label="Cards">
          <TweakSlider label="Corner radius" value={tweaks.cardRadius} min={8} max={48} step={4} onChange={(v) => setTweak('cardRadius', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>);

}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
